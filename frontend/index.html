<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Recognition Quiz</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
</head>
<body>
  <!-- Start Screen -->
  <div id="start-screen">
    <h1>Welcome to the Music Quiz!</h1>
    <input type="text" id="player-name" placeholder="Enter your name" />
    <div id="genre-selection">
      <button class="genre-btn" data-folder="seedhe-maut">🎤 Rap</button>
      <button class="genre-btn" data-folder="pop">🎵 Pop</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-container" class="hidden">
    <div class="top-bar">
      <div id="countdown">5</div>
      <div class="player-info">
        <span id="player-display"></span>
        <div id="score-container">
          <p>Score: <span id="current-score">0</span> / <span id="total-score">50</span></p>
        </div>
      </div>
      <div class="controls">
        <button id="close-btn">❌</button>
        <button id="fullscreen-btn">⛶</button>
        <button id="mute-btn">🔇</button>
      </div>
    </div>

    <div id="question-container">
      <h2 id="round-info">ROUND 1</h2>
      <h1 id="question-text">Guess the song!</h1>
      <audio id="song-preview" src=""></audio>
    </div>

    <div id="options-container"></div>
  </div>

  <!-- Game Over -->
  <div id="game-over-screen" class="hidden">
    <h1>Game Over!</h1>
    <p>Your final score is: <span id="final-score"></span></p>
    <p>High Score: <span id="high-score-display"></span></p>
    <button id="play-again-btn">Play Again</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
